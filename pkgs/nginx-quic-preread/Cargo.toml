[package]
name = "ngx-quic-preread"
version = "0.1.0"
edition = "2021"
description = "nginx stream module: preread SNI/ALPN from QUIC Initial packets (the QUIC analogue of ssl_preread)"
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "ngx_quic_preread"
# staticlib -> linked into nginx by the buildsystem (auto/rust builds this
#              target with `cargo rustc --crate-type staticlib`).
# lib       -> lets `cargo test` exercise the pure-Rust core without nginx.
crate-type = ["lib", "staticlib"]

[features]
# The nginx glue is behind a feature so the QUIC/TLS core can be built and
# unit-tested with a plain `cargo test`, i.e. without an nginx source tree /
# bindgen / libclang present. The nginx build enables it explicitly via the
# `ngx_rust_target_features=nginx` line in `config` (auto/rust always passes
# `--no-default-features`).
default = []
nginx = ["dep:ngx"]

[dependencies]
# QUIC Initial packet protection (RFC 9001) uses only these primitives.
aes = "0.8"          # AES-128 ECB block for the header-protection mask
aes-gcm = "0.10"     # AEAD_AES_128_GCM payload protection
hkdf = "0.12"        # HKDF-Extract / HKDF-Expand (TLS 1.3 key schedule)
sha2 = "0.10"        # SHA-256 for the above

# nginx module bindings (ngx-rust). Optional: only needed for the staticlib.
# no_std-friendly config matching the ngx-rust nginx build.
ngx = { version = "0.5.1", optional = true, default-features = false, features = [
  "std",
] }

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1
