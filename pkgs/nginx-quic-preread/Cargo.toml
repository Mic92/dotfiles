[package]
name = "ngx-quic-preread"
version = "0.1.0"
edition = "2021"
description = "nginx stream module: preread SNI/ALPN from QUIC Initial packets (the QUIC analogue of ssl_preread)"
license = "MIT OR Apache-2.0"

[lib]
# cdylib -> the loadable nginx module (ngx_stream_quic_preread_module.so)
# rlib   -> lets `cargo test` exercise the pure-Rust core without nginx headers
crate-type = ["cdylib", "rlib"]

[features]
# The nginx glue is behind a feature so the QUIC/TLS core can be built and
# unit-tested with a plain `cargo test --no-default-features`, i.e. without an
# nginx source tree / bindgen / libclang present.
default = ["nginx"]
nginx = ["dep:ngx"]

[dependencies]
# QUIC Initial packet protection (RFC 9001) uses only these primitives.
aes = "0.8"          # AES-128 ECB block for header-protection mask
aes-gcm = "0.10"     # AEAD_AES_128_GCM payload protection
hkdf = "0.12"        # HKDF-Extract / HKDF-Expand (TLS 1.3 key schedule)
sha2 = "0.10"        # SHA-256 for the above

# nginx module bindings (ngx-rust). Optional: only needed for the cdylib.
ngx = { version = "0.5", optional = true }

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1
