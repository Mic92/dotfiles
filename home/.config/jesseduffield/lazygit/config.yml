update:
  method: never
disableStartupPopups: true
gui:
  showFileTree: true
  nerdFontsVersion: 3
  showRandomTip: false
  showCommandLog: false
  showBottomLine: false
  filterMode: fuzzy
  showDivergenceFromBaseBranch: arrowAndNumber
  sidePanelWidth: 0.28
  expandFocusedSidePanel: true
  # crank high so unfocused side panels collapse to ~1 line; lazygit cannot
  # reorder/hide panels (hardcoded, see jesseduffield/lazygit#3621)
  expandedSidePanelWeight: 20
  enlargedSideViewLocation: top
  scrollOffMargin: 5
  commitHashLength: 7
  authorColors:
    "Jörg Thalheim": "#7aa2f7"
    "*[bot]": "#565f89"
    "*": "#bb9af7"
  # Tokyo Night (folke/tokyonight.nvim extras/lazygit)
  theme:
    activeBorderColor: ["#ff9e64", "bold"]
    inactiveBorderColor: ["#27a1b9"]
    searchingActiveBorderColor: ["#ff9e64", "bold"]
    optionsTextColor: ["#7aa2f7"]
    selectedLineBgColor: ["#283457"]
    cherryPickedCommitFgColor: ["#7aa2f7"]
    cherryPickedCommitBgColor: ["#bb9af7"]
    markedBaseCommitFgColor: ["#7aa2f7"]
    markedBaseCommitBgColor: ["#e0af68"]
    unstagedChangesColor: ["#db4b4b"]
    defaultFgColor: ["#c0caf5"]
    inactiveViewSelectedLineBgColor: ["#1f2335"]
os:
  editPreset: nvim
git:
  log:
    # topo-order makes lazygit unusably slow on huge repos like nixpkgs
    # https://github.com/jesseduffield/lazygit/issues/5163
    order: default
  pagers:
    - pager: delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
  autoFetch: false
  autoStageResolvedConflicts: false
  parseEmoji: true
customCommands:
  - key: "<c-r>"
    command: 'git rebase --interactive "{{.SelectedCommit.Sha}}"'
    context: "commits"
    output: terminal
  - key: "<c-g>"
    command: "gh pr create --fill --web"
    context: "global"
    loadingText: "Creating pull request on GitHub"
  - key: "<c-n>"
    prompts:
      - type: "input"
        title: "What is the new branch name?"
        initialValue: ""
    command: 'git fetch upstream master && git branch --merged upstream/master | xargs --no-run-if-empty git branch -D && git checkout -b "{{index .PromptResponses 0}}" upstream/master && git cherry-pick "{{.SelectedLocalCommit.Sha}}" && git push -u origin {{index .PromptResponses 0}}'
    context: "commits"
    output: terminal
  - key: "<c-p>"
    prompts:
      - type: "input"
        title: "What is the new branch name?"
        initialValue: ""
    command: 'git fetch origin main && git branch --merged origin/main | xargs --no-run-if-empty git branch -D && git checkout -b "{{index .PromptResponses 0}}" origin/main && git cherry-pick "{{.SelectedCommit.Sha}}" && git push -u origin {{index .PromptResponses 0}}'
    context: "commits"
    output: terminal
  - key: "<c-a>"
    context: "global"
    command: "for b in upstream/main upstream/master origin/main origin/master origin/dev; do if git rev-parse --verify $b; then git absorb --force --and-rebase --base $b; break; fi; done"
    output: terminal
  # Blame via tig
  - key: b
    command: tig blame -- "{{.SelectedFile.Name}}"
    context: files
    description: blame file at tree
    output: terminal
  - key: b
    command: tig blame {{.SelectedSubCommit.Sha}} -- "{{.SelectedCommitFile.Name}}"
    context: commitFiles
    description: blame file at revision
    output: terminal
  - key: B
    command: tig blame -- "{{.SelectedCommitFile.Name}}"
    context: commitFiles
    description: blame file at tree
    output: terminal
  # Browse files at revision via tig
  - key: t
    command: tig show {{.SelectedSubCommit.Sha}}
    context: subCommits
    description: tig commit (`t` again to browse files at revision)
    output: terminal
  - key: t
    command: tig show {{.SelectedLocalBranch.Name}}
    context: localBranches
    description: tig branch (`t` again to browse files at revision)
    output: terminal
  - key: t
    command: tig show {{.SelectedRemoteBranch.RemoteName}}/{{.SelectedRemoteBranch.Name}}
    context: remoteBranches
    description: tig branch (`t` again to browse files at revision)
    output: terminal
  # File history
  - key: t
    command: tig {{.SelectedSubCommit.Sha}} -- "{{.SelectedCommitFile.Name}}"
    context: commitFiles
    description: tig file (history of commits affecting file)
    output: terminal
  - key: t
    command: tig -- "{{.SelectedFile.Name}}"
    context: files
    description: tig file (history of commits affecting file)
    output: terminal
