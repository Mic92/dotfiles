; Tokyo Night (night) â€” fast-syntax-highlighting
; Relies on terminal ANSI palette being Tokyo Night (ghostty/foot/alacritty).
; 256-color fallbacks: commentâ‰ˆ60 gutterâ‰ˆ237 bg_hlâ‰ˆ236 orangeâ‰ˆ215 purpleâ‰ˆ141

[base]
default          = none
unknown-token    = red,bold
commandseparator = 60
redirection      = magenta
here-string-tri  = yellow
here-string-text = bg:236
here-string-var  = cyan,bg:236
exec-descriptor  = yellow,bold
comment          = 60
correct-subtle   = green
incorrect-subtle = red
subtle-separator = 237
subtle-bg        = bg:236
secondary        = tokyonight
; recursive-base =

[command-point]
reserved-word     = magenta
subcommand        = 215
alias             = blue
suffix-alias      = blue
global-alias      = blue,bg:236
builtin           = blue
function          = blue
command           = blue
precommand        = magenta
hashed-command    = blue
single-sq-bracket = cyan
double-sq-bracket = cyan
double-paren      = magenta

[paths]
path          = cyan
pathseparator = 60
path-to-dir   = cyan,underline
globbing      = 215,bold
globbing-ext  = 215

[brackets]
paired-bracket  = bg:236
bracket-level-1 = blue
bracket-level-2 = magenta
bracket-level-3 = cyan

[arguments]
single-hyphen-option   = cyan
double-hyphen-option   = cyan
back-quoted-argument   = none
single-quoted-argument = green
double-quoted-argument = green
dollar-quoted-argument = green

[in-string]
back-dollar-quoted-argument           = yellow
back-or-dollar-double-quoted-argument = cyan

[other]
variable             = none
assign               = none
assign-array-bracket = magenta
history-expansion    = magenta,bold

[math]
mathvar = blue
mathnum = 215
matherr = red

[for-loop]
forvar  = none
fornum  = 215
foroper = magenta
forsep  = 60
